<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين - برج إدارة الموردين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --vendor-primary: #1a0033; --gold: #FFD700; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; }
        
        .sidebar { width: 260px; height: 100vh; background: var(--vendor-primary); color: white; position: fixed; padding: 20px; box-sizing: border-box; }
        .main-content { margin-right: 260px; width: calc(100% - 260px); min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        .sidebar h2 { color: var(--gold); text-align: center; font-size: 20px; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 20px; }
        .nav-link { display: block; color: white; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,215,0,0.1); color: var(--gold); }
        .nav-link i { margin-left: 10px; width: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>محجوب أونلاين <br><small style="font-size: 12px; opacity: 0.7;">سوقك الذكي</small></h2>
        <nav style="margin-top: 30px;">
            <a href="{{ url_for('vendor_dashboard') }}" class="nav-link"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="{{ url_for('add_product') }}" class="nav-link"><i class="fas fa-plus-circle"></i> إضافة منتج</a>
            <a href="#" class="nav-link"><i class="fas fa-box"></i> منتجاتي</a>
            <a href="{{ url_for('logout') }}" class="nav-link" style="margin-top: 50px; color: #ff4444;"><i class="fas fa-sign-out-alt"></i> خروج</a>
        </nav>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
