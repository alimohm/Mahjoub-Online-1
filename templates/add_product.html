{% extends "layout.html" %}

{% block title %}إضافة منتج | سوقك الذكي{% endblock %}

{% block content %}
<style>
    /* التنسيقات الأساسية المتوافقة مع الهوية */
    .upload-card {
        background: #ffffff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        max-width: 850px;
        margin: 20px auto;
        border: 1px solid #f0f0f0;
    }

    /* صندوق مساعد الكتابة الذكي - الأداة الوحيدة الآن */
    .ai-dashed-box {
        border: 2px dashed #6a11cb;
        background: #fdfbff;
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        margin: 25px 0;
    }

    .ai-trigger-btn {
        background: #4b0082;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .form-control {
        border-radius: 10px;
        border: 1px solid #ddd;
        padding: 12px;
        font-family: 'Cairo', sans-serif;
    }

    .main-submit-btn {
        width: 100%;
        background: #4b0082;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 800;
        cursor: pointer;
    }
</style>

<div class="upload-card" dir="rtl">
    <h5 class="text-center mb-4" style="color: #4b0082; font-weight: 800;">إضافة منتج جديد للمنصة</h5>

    <form id="productForm">
        <div class="row g-3 mb-3">
            <div class="col-md-8">
                <label class="fw-bold">اسم المنتج</label>
                <input type="text" id="prodName" class="form-control" placeholder="أدخل اسم المنتج...">
            </div>
            <div class="col-md-4">
                <label class="fw-bold">الفئة</label>
                <select class="form-control"><option>إلكترونيات</option></select>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="fw-bold">السعر</label>
                <input type="number" class="form-control" placeholder="0.00">
            </div>
            <div class="col-md-4">
                <label class="fw-bold">العملة</label>
                <select class="form-control"><option>ريال سعودي</option></select>
            </div>
            <div class="col-md-4">
                <label class="fw-bold">الكمية</label>
                <input type="number" class="form-control" placeholder="100">
            </div>
        </div>

        <div class="ai-dashed-box">
            <p style="color: #6a11cb; font-weight: 800; margin-bottom: 12px;">✨ مساعد الكتابة الذكي</p>
            <button type="button" class="ai-trigger-btn" data-bs-toggle="modal" data-bs-target="#aiModal">
                توليد الوصف بالمواصفات <i class="fas fa-magic"></i>
            </button>
        </div>

        <div class="mb-4">
            <label class="fw-bold">وصف المنتج (النتيجة)</label>
            <textarea id="prodDesc" class="form-control" rows="5" placeholder="سيتم تعبئة الوصف هنا تلقائياً..."></textarea>
        </div>

        <div class="mb-4">
            <label class="fw-bold">صورة المنتج</label>
            <input type="file" class="form-control">
        </div>

        <button type="submit" class="main-submit-btn">
            <i class="fas fa-rocket"></i> نشر المنتج الآن
        </button>
    </form>
</div>

<div class="modal fade" id="aiModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered text-end" dir="rtl">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">المواصفات (اكتب نقاط سريعة):</label>
                    <textarea id="aiSpecs" class="form-control" rows="3" placeholder="مثلاً: دقة 4K، معالج قوي، بطارية تدوم 24 ساعة..."></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">أسلوب الكتابة:</label>
                    <select id="aiStyle" class="form-control">
                        <option value="خبير">👨‍🏫 خبير (تركيز على التفاصيل التقنية)</option>
                        <option value="احترافي">💼 احترافي (رسمي وتسويقي)</option>
                        <option value="ودي">😊 ودي (جذاب وقريب للمستهلك)</option>
                        <option value="بسيط">📝 بسيط (واضح ومباشر)</option>
                    </select>
                </div>
                <button type="button" class="main-submit-btn" onclick="executeGeneration()">توليد الوصف الآن ✨</button>
            </div>
        </div>
    </div>
</div>

<script>
    function executeGeneration() {
        const name = document.getElementById('prodName').value;
        const specs = document.getElementById('aiSpecs').value;
        const style = document.getElementById('aiStyle').value;
        const output = document.getElementById('prodDesc');

        if(!name) { alert("يرجى إدخال اسم المنتج أولاً."); return; }

        // إغلاق المودال وبدء التوليد
        bootstrap.Modal.getInstance(document.getElementById('aiModal')).hide();
        output.value = "جاري التوليد بذكاء لأسلوبك الـ " + style + "...";

        setTimeout(() => {
            let text = "";
            if(style === "خبير") {
                text = `تقرير تقني لمنتج ${name}: يتميز بمواصفات عالية تشمل (${specs}) لضمان أداء احترافي فائق الدقة.`;
            } else if(style === "ودي") {
                text = `يا هلا! جبنا لك ${name} الرهيب. بميزات مثل (${specs})، بيسهل عليك حياتك اليومية بشكل ما تتخيله!`;
            } else {
                text = `نقدم لكم ${name} المتوفر الآن بمواصفات (${specs}). جودة مضمونة تجدونها فقط في سوقك الذكي.`;
            }
            output.value = text;
        }, 1200);
    }
</script>
{% endblock %}
