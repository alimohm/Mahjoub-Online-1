<div id="uploadProductModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 15px;">
    
    <div class="modal-content" style="background: white; width: 100%; max-width: 700px; border-radius: 30px; padding: 25px; position: relative; max-height: 95vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.4);">
        
        <div onclick="closeUploadModal()" style="position: absolute; top: 15px; left: 15px; cursor: pointer; color: #bdc3c7;">
            <i class="fas fa-times-circle fa-2x"></i>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: var(--main-p-color); font-weight: 800; margin: 0; font-size: 22px;">رفع منتج جديد للسوق الملكي</h2>
            <p style="color: #7f8c8d; font-size: 13px;">عزز سلسلة إمدادك الرقمية بأفضل المنتجات</p>
        </div>

        <form id="productForm" action="/add_product" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
            
            <div style="position: relative;">
                <input type="text" id="p_name" name="p_name" placeholder="اسم المنتج (سيتم تسمية الملفات باسمه تلقائياً)" required style="width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #eee; outline: none; font-family: 'Cairo';">
                <button type="button" onclick="generateAIDesc()" title="توليد وصف بالذكاء الاصطناعي" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--main-p-color); cursor: pointer; font-size: 18px;">
                    <i class="fas fa-magic"></i>
                </button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" name="p_price" placeholder="السعر" required style="padding: 14px; border-radius: 12px; border: 1.5px solid #eee;">
                <select name="p_currency" style="padding: 14px; border-radius: 12px; border: 1.5px solid #eee; background: white; font-family: 'Cairo';">
                    <option value="MAH">MAH (رصيد المنصة)</option>
                    <option value="SAR">ريال سعودي (SAR)</option>
                    <option value="USD">دولار أمريكي (USD)</option>
                    <option value="YER">ريال يمني (YER)</option>
                </select>
            </div>

            <textarea id="p_desc" name="p_desc" placeholder="وصف المنتج بالتفصيل... (اضغط على العصا السحرية للمساعدة)" rows="4" style="width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #eee; resize: none; font-family: 'Cairo';"></textarea>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div onclick="document.getElementById('p_images').click()" style="border: 2px dashed #cbd5e1; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; background: #f8fafc;">
                    <i class="fas fa-images" style="color: var(--main-p-color); font-size: 24px;"></i>
                    <p style="margin: 5px 0 0; font-size: 11px; font-weight: 700;">صور (واحدة إجبارية)</p>
                    <input type="file" id="p_images" name="p_images" accept="image/*" multiple required style="display: none;" onchange="previewFiles(this, 'img_preview')">
                </div>
                <div onclick="document.getElementById('p_video').click()" style="border: 2px dashed #cbd5e1; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; background: #f8fafc;">
                    <i class="fas fa-video" style="color: #e74c3c; font-size: 24px;"></i>
                    <p style="margin: 5px 0 0; font-size: 11px; font-weight: 700;">فيديو (اختياري)</p>
                    <input type="file" id="p_video" name="p_video" accept="video/*" style="display: none;" onchange="previewFiles(this, 'vid_preview')">
                </div>
            </div>

            <div id="media_preview" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px;">
                <div id="img_preview" style="display: flex; gap: 5px;"></div>
                <div id="vid_preview"></div>
            </div>

            <button type="submit" style="width: 100%; background: var(--main-p-color); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(75,0,130,0.2);">
                تأكيد المزامنة والرفع الملكي
            </button>
        </form>
    </div>
</div>

<script>
    function openUploadModal() { document.getElementById('uploadProductModal').style.display = 'flex'; }
    function closeUploadModal() { document.getElementById('uploadProductModal').style.display = 'none'; }

    // محاكاة الذكاء الاصطناعي لتوليد الوصف
    function generateAIDesc() {
        const name = document.getElementById('p_name').value;
        if(!name) { alert("يرجى كتابة اسم المنتج أولاً"); return; }
        document.getElementById('p_desc').value = `منتج ${name} عالي الجودة، مصمم خصيصاً لعملاء محجوب أونلاين. يتميز بمتانة فائقة وتصميم عصري يناسب احتياجاتك الرقمية.`;
    }

    // معاينة الملفات
    function previewFiles(input, previewId) {
        const preview = document.getElementById(previewId);
        preview.innerHTML = '';
        if (input.files) {
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const el = document.createElement(input.accept.includes('image') ? 'img' : 'i');
                    if(input.accept.includes('image')) {
                        el.src = e.target.result;
                        el.style = "width: 60px; height: 60px; border-radius: 8px; object-fit: cover;";
                    } else {
                        el.className = "fas fa-file-video fa-2x";
                        el.style = "color: #e74c3c;";
                    }
                    preview.appendChild(el);
                };
                reader.readAsDataURL(file);
            });
        }
    }
</script>
