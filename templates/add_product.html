{% extends "layout.html" %}

{% block title %}إضافة منتج - سوقك الذكي{% endblock %}

{% block content %}
<style>
    :root {
        --royal-purple: #4b0082;
        --accent-purple: #6a11cb;
        --soft-gray: #f4f7f6;
    }

    .upload-card {
        background: #ffffff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        max-width: 800px;
        margin: 20px auto;
        border: 1px solid #eee;
    }

    .form-control {
        border-radius: 12px;
        border: 1px solid #ddd;
        padding: 12px;
        font-family: 'Cairo', sans-serif;
        transition: 0.3s;
    }

    /* أداة المساعد الذكي المدمجة */
    .ai-smart-tool {
        background: #fdfbff;
        border: 2px dashed var(--accent-purple);
        border-radius: 15px;
        padding: 20px;
        margin: 20px 0;
    }

    .ai-btn {
        background: var(--royal-purple);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    /* القائمة المنسدلة الاحترافية */
    .ai-dropdown-content {
        display: none;
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        margin-top: 15px;
        overflow: hidden;
        border: 1px solid #eee;
    }

    .style-option {
        padding: 12px 20px;
        cursor: pointer;
        border-bottom: 1px solid #f9f9f9;
        transition: 0.2s;
    }

    .style-option:hover { background: #f0ebff; color: var(--royal-purple); }

    .btn-submit-main {
        width: 100%;
        background: var(--royal-purple);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-weight: 800;
        cursor: pointer;
    }
</style>

<div class="upload-card" dir="rtl">
    <h5 class="text-center mb-4 fw-bold" style="color: var(--royal-purple);">✨ إضافة منتج جديد</h5>

    <form id="productForm" method="POST" enctype="multipart/form-data">
        <div class="row g-3 mb-4">
            <div class="col-md-8">
                <label class="form-label fw-bold small">اسم المنتج</label>
                <input type="text" id="prodName" name="name" class="form-control" placeholder="أدخل اسم المنتج..." required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold small">الفئة</label>
                <select name="category" class="form-control">
                    <option value="electronics">إلكترونيات</option>
                    <option value="fashion">أزياء</option>
                </select>
            </div>
        </div>

        <div class="ai-smart-tool text-center">
            <button type="button" class="ai-btn" onclick="toggleAIDropdown()">
                <i class="fas fa-magic"></i> مساعد الكتابة الذكي
            </button>
            
            <div id="aiDropdown" class="ai-dropdown-content text-end">
                <div class="p-3 border-bottom">
                    <label class="small fw-bold">المواصفات (اختياري):</label>
                    <textarea id="aiSpecsInput" class="form-control mt-1" rows="2" placeholder="أدخل نقاط مثل: جودة عالية، شحن سريع..."></textarea>
                </div>
                <div class="style-option" onclick="generateContent('خبير')">👨‍🏫 خبير (تركيز على التفاصيل التقنية)</div>
                <div class="style-option" onclick="generateContent('احترافي')">💼 احترافي (رسمي وتسويقي)</div>
                <div class="style-option" onclick="generateContent('ودي')">😊 ودي (جذاب وقريب للمستهلك)</div>
                <div class="style-option" onclick="generateContent('بسيط')">📝 بسيط (واضح ومباشر)</div>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold small">وصف المنتج</label>
            <textarea id="finalDescription" name="description" class="form-control" rows="5" placeholder="اكتب الوصف هنا..."></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold small">الصور والفيديوهات</label>
            <input type="file" id="mediaFiles" name="files" class="form-control" multiple accept="image/*,video/*" onchange="safeRename(this)">
            <div id="renameNotice" class="mt-2 text-success small d-none"><i class="fas fa-check"></i> تم ربط الملفات باسم المنتج برمجياً.</div>
        </div>

        <button type="submit" class="btn-submit-main">نشر المنتج الآن 🚀</button>
    </form>
</div>

<script>
    // فتح وإغلاق القائمة بأمان
    function toggleAIDropdown() {
        const dropdown = document.getElementById('aiDropdown');
        dropdown.style.display = (dropdown.style.display === 'block') ? 'none' : 'block';
    }

    // توليد المحتوى مع الحماية من الأخطاء
    function generateContent(style) {
        const name = document.getElementById('prodName').value.trim();
        const specs = document.getElementById('aiSpecsInput').value.trim();
        const target = document.getElementById('finalDescription');

        if (!name) {
            alert("يرجى كتابة اسم المنتج أولاً لتخصيص الوصف.");
            return;
        }

        target.value = "جاري التوليد بذكاء لأسلوبك الـ " + style + "...";
        
        // محاكاة سريعة
        setTimeout(() => {
            let text = "";
            if(style === 'خبير') text = `المواصفات الفنية لـ ${name}: (${specs}). أداء احترافي فائق الدقة.`;
            else if(style === 'ودي') text = `يا هلا! جبنا لك ${name} الرهيب. بميزات مثل (${specs})، بيخلي حياتك أسهل وأحلى.`;
            else text = `نقدم لكم ${name} الجديد بمواصفات (${specs}). متوفر الآن بجودة عالية في سوقك الذكي.`;
            
            target.value = text;
            toggleAIDropdown();
        }, 800);
    }

    // إعادة التسمية الآمنة للملفات
    function safeRename(input) {
        const name = document.getElementById('prodName').value.trim();
        if (!name && input.files.length > 0) {
            alert("اكتب اسم المنتج أولاً ليتمكن النظام من تسمية الميديا تلقائياً.");
            input.value = ""; 
            return;
        }
        if (input.files.length > 0) {
            document.getElementById('renameNotice').classList.remove('d-none');
        }
    }
</script>
{% endblock %}
