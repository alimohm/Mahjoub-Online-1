<div style="background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #7b2cbf; text-align: center;">
    <h2 style="color: #9d4edd;">[ Mahjoub Online ]</h2>
    <p style="color: #888;">دخول الموردين - المنصة اللامركزية</p>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="اسم المورد" style="width: 100%; margin-bottom: 15px;">
        <input type="password" name="password" placeholder="كلمة المرور" style="width: 100%;">
        <button type="submit" style="background: #7b2cbf; color: white; width: 100%; padding: 10px; margin-top: 20px;">دخول</button>
    </form>
</div>
