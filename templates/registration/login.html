<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الموردين | محجوب أونلاين</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}?v=2.1">
    <style>
        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            animation: pulseBg 10s infinite alternate;
        }
        @keyframes pulseBg { 0% { background-color: #050505; } 100% { background-color: #0d0216; } }
        
        .ai-card {
            background: rgba(20, 20, 20, 0.9);
            padding: 45px; border-radius: 25px;
            border: 1px solid #7b2cbf;
            width: 350px; text-align: center;
            box-shadow: 0 0 30px rgba(123, 44, 191, 0.2);
            transition: 0.4s ease-in-out;
        }
        .ai-card:hover { box-shadow: 0 0 50px rgba(123, 44, 191, 0.4); transform: scale(1.02); }
        
        .logo { font-size: 26px; font-weight: bold; color: #9d4edd; text-shadow: 0 0 10px rgba(157, 78, 221, 0.5); }
        input {
            width: 100%; padding: 14px; margin: 15px 0; background: #000;
            border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box;
        }
        .btn-glow {
            width: 100%; padding: 16px; background: #7b2cbf; border: none;
            color: white; border-radius: 12px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.3); transition: 0.3s;
        }
        .btn-glow:hover { background: #9d4edd; box-shadow: 0 4px 25px rgba(157, 78, 221, 0.6); }
    </style>
</head>
<body>
    <div class="ai-card">
        <div class="logo">MAHJOUB ONLINE</div>
        <p style="color: #888; font-size: 13px;">Smart Market System</p>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="معرف المورد" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-glow">دخول النظام ذكياً</button>
        </form>
    </div>
</body>
</html>
