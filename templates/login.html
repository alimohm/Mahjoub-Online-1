<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | محجوب أونلاين</title>
    <style>
        /* إعدادات الألوان المستوحاة من التصميم الجديد */
        :root {
            --primary-purple: #7b2cbf;
            --bg-white: #ffffff;
            --soft-gray: #f8f9fa;
            --text-dark: #333333;
            --error-red: #e74c3c;
        }

        body {
            background-color: var(--soft-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* حاوية البطاقة البيضاء النظيفة */
        .login-card {
            background: var(--bg-white);
            padding: 45px 35px;
            border-radius: 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #f0f0f0;
            position: relative;
        }

        /* لمسة الخط العلوي البنفسجي */
        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 5px;
            background: var(--primary-purple);
            border-radius: 0 0 10px 10px;
        }

        .brand-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-purple);
            margin: 0 0 10px 0;
        }

        .brand-slogan {
            font-size: 14px;
            color: #888;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* نظام التنبيهات المنقى */
        .alert {
            background: #fff5f5;
            color: var(--error-red);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 13px;
            border-right: 5px solid var(--error-red);
            text-align: right;
        }

        .input-group {
            text-align: right;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-purple);
            margin-bottom: 8px;
            padding-right: 5px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 18px;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-purple);
            outline: none;
            box-shadow: 0 0 10px rgba(123, 44, 191, 0.05);
        }

        /* الزر البنفسجي الاحترافي */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary-purple);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #5a189a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(123, 44, 191, 0.2);
        }

        .footer-copyright {
            margin-top: 35px;
            font-size: 11px;
            color: #bbb;
        }

        /* التوافق مع الجوال */
        @media (max-width: 480px) {
            .login-card { padding: 35px 25px; }
            .brand-title { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-title">محجوب أونلاين | سوقك الذكي</div>
        <div class="brand-slogan">
            المنصة الأولى لحوكمة سلاسل التوريد الرقمية <span style="color:var(--primary-purple)">بأسلوب ذكي</span> وآمن تماماً.
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>اسم المستخدم (المورد)</label>
                <input type="text" name="username" placeholder="أدخل معرفك الرقمي" required>
            </div>

            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">دخول المنصة آمن</button>
        </form>

        <div class="footer-copyright">
            © 2026 [ Mahjoub Online ] - التقنية في خدمة التجارة
        </div>
    </div>

</body>
</html>
