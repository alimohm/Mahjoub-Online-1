<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول | محجوب أونلاين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #fff; }
        .brand-side { flex: 1; background: #4b0082; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        .login-side { flex: 1; display: flex; justify-content: center; align-items: center; }
        .card { width: 100%; max-width: 380px; padding: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #4b0082; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .alert { background: #fff0f0; color: #d63031; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fab1a0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="brand-side">
        <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" style="width: 120px; filter: brightness(0) invert(1);">
        <h1>محجوب أونلاين</h1>
        <p>المنصة الأولى لدعم الموردين والنمو الرقمي</p>
        <div style="margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px;">
            <i class="fas fa-network-wired"></i> اللامركزية متطورة وحوكمة رقمية
        </div>
    </div>
    <div class="login-side">
        <div class="card">
            <h2>تسجيل الدخول</h2>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="text" name="username" placeholder="اسم المستخدم" required>
                <input type="password" name="password" placeholder="كلمة المرور" required>
                <button type="submit">دخول للمنصة</button>
            </form>
        </div>
    </div>
</body>
</html>
