<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الموردين | محجوب أونلاين</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #141417; padding: 40px; border-radius: 25px; border: 1px solid #8a2be2; width: 320px; text-align: center; box-shadow: 0 0 20px rgba(138, 43, 226, 0.2); }
        .logo { font-size: 22px; font-weight: bold; color: #bc13fe; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #8a2be2; border: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #bc13fe; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">MAHJOUB ONLINE</div>
        <form method="POST">
            <input type="text" name="username" placeholder="معرف المورد" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn">دخول المنصة</button>
        </form>
    </div>
</body>
</html>
