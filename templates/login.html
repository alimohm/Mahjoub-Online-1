    <title>تسجيل الدخول | محجوب أونلاين - 2026</title>

    <style>
        :root {
            --p-color: #632C8F; /* اللون البنفسجي الأساسي */
            --p-hover: #4b0082;
        }

        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Cairo', sans-serif; background: #0c0019; }

        /* الأقسام المعكوسة (عكس الترتيب البصري) */
        
        /* القسم الأيسر - الهوية البصرية (البنفسجي المعكوس) */
        .brand-section { flex: 1.2; background: var(--p-color); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 20px; transition: 0.3s; }
        
        /* القسم الأيمن - نموذج الدخول (الأبيض المعكوس) */
        .login-section { flex: 1; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }

        .login-card { width: 100%; max-width: 380px; text-align: center; }
        .login-card h2 { font-size: 28px; color: #333; margin-bottom: 5px; font-weight: 700; }
        .login-card p { font-size: 16px; color: #777; margin-bottom: 30px; }

        /* تنسيق الحقول باللون البنفسجي على الأبيض */
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 15px; padding-right: 45px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9fb; font-size: 16px; font-family: 'Cairo'; }
        .input-group input:focus { border-color: var(--p-color); outline: none; }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--p-color); font-size: 18px; }

        .btn-login { width: 100%; padding: 15px; background: var(--p-color); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 18px; margin-top: 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-login:hover { background: var(--p-hover); transform: translateY(-2px); }

        /* الهوية البصرية (اليسار المعكوس) */
        .logo { width: 130px; filter: brightness(0) invert(1); margin-bottom: 30px; } /* اللوجو الآن أبيض ناصع */
        .brand-section h1 { font-size: 36px; margin-bottom: 10px; font-weight: 700; }
        .brand-section p { font-size: 18px; opacity: 0.8; margin-bottom: 50px; max-width: 80%; }
        
        /* نقاط القوة المتجاوبة */
        .feature-item { background: rgba(255,255,255,0.1); padding: 18px; margin: 10px; border-radius: 15px; width: 75%; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.2); }
        .feature-item i { color: #FFD700; font-size: 22px; margin-left: 15px; } /* لون ذهبي للأيقونات */
        .feature-item span { font-size: 16px; font-weight: 600; }
