{% extends 'admin_layout.html' %}

{% block title %}إدارة الموردين والاعتماد{% endblock %}

{% block content %}
<div class="admin-card shadow-sm p-4" style="background: white; border-radius: 20px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 style="font-weight: 800; color: var(--royal-p);">
            <i class="fas fa-users-cog ml-2"></i> قائمة الموردين والطلبات المعلقة
        </h4>
        <button class="btn btn-primary" style="background: var(--royal-p); border: none; border-radius: 12px; padding: 10px 20px;" data-bs-toggle="modal" data-bs-target="#addVendorModal">
            <i class="fas fa-plus-circle"></i> إضافة مورد سيادي
        </button>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>المورد</th>
                <th>الحالة</th>
                <th>العمليات</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

{% include 'modals/add_vendor_modal.html' %}

{% endblock %}
