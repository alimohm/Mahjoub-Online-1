<div class="upload-card" style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border-top: 5px solid #4b0082; animation: slideUp 0.6s ease-out;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 25px;">
        <i class="fas fa-plus-square" style="font-size: 1.8rem; color: #4b0082;"></i>
        <h3 style="margin: 0; color: #2e004f;">إضافة منتج جديد للمتجر</h3>
    </div>

    <form action="/add_product" method="POST" enctype="multipart/form-data" id="productForm">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">صورة المنتج الاحترافية</label>
            <div id="dropzone" style="border: 2px dashed #ddd; padding: 30px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#4b0082'" onmouseout="this.style.borderColor='#ddd'">
                <i class="fas fa-cloud-upload-alt" style="font-size: 2.5rem; color: #bbb; margin-bottom: 10px;"></i>
                <p style="margin: 0; color: #888; font-size: 0.9rem;">اسحب الصورة هنا أو اضغط للاختيار</p>
                <input type="file" name="image" id="fileInput" accept="image/*" hidden required>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">اسم المنتج</label>
                <input type="text" name="name" placeholder="مثلاً: هاتف ذكي" required style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; outline: none;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">السعر (ريال)</label>
                <input type="number" name="price" placeholder="0.00" required style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; outline: none;">
            </div>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">وصف المنتج</label>
            <textarea name="description" rows="3" placeholder="اكتب وصفاً يجذب المشترين..." style="width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; outline: none; resize: none;"></textarea>
        </div>

        <button type="submit" style="width: 100%; background: linear-gradient(90deg, #4b0082, #2e004f); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(75, 0, 130, 0.2);">
            <i class="fas fa-rocket" style="margin-left: 8px;"></i> نشر المنتج في محجوب أونلاين
        </button>
    </form>
</div>

<script>
    // منطق اختيار الملف البصري
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', function() {
        if(this.files[0]) dropzone.innerHTML = `<i class="fas fa-check-circle" style="color:#4b0082; font-size:2rem;"></i><p>${this.files[0].name}</p>`;
    });
</script>

<style>
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 576px) { .upload-card { padding: 20px; } div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; } }
</style>
