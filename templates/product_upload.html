<div class="card" style="background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
    <h5 style="color: #632C8F;"><i class="fas fa-plus-circle"></i> إضافة منتج جديد للمتجر</h5>
    <form action="{{ url_for('add_product') }}" method="POST" enctype="multipart/form-data">
        <div style="margin-bottom: 15px;">
            <input type="text" name="name" placeholder="اسم المنتج" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        <div style="margin-bottom: 15px;">
            <input type="number" name="price" placeholder="السعر الأساسي ($)" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        <div style="margin-bottom: 15px;">
            <input type="file" name="image" required>
        </div>
        <button type="submit" style="width: 100%; padding: 15px; background: #632C8F; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
            نشر وتفعيل الربط التلقائي
        </button>
    </form>
</div>
