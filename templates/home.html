<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الموردين | محجوب أونلاين</title>
    <style>
        :root {
            --primary: #8a2be2;
            --accent: #bc13fe;
            --bg: #0a0a0c;
            --card-bg: #141417;
        }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 40px 40px; /* خلفية منقطة خفيفة توحي بالذكاء التقني */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 15px rgba(138, 43, 226, 0.1);
            width: 100%; max-width: 400px;
            border: 1px solid #222;
            text-align: center;
        }
        .logo-area { margin-bottom: 30px; }
        .logo-area h1 {
            font-size: 22px; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .logo-area p { color: #666; font-size: 13px; margin-top: 5px; }
        
        .input-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        input {
            width: 100%; padding: 14px; background: #000; border: 1px solid #333;
            color: white; border-radius: 12px; font-size: 16px; box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(138, 43, 226, 0.4); }
        
        .login-btn {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
        }
        .login-btn:hover { background: var(--accent); transform: translateY(-2px); }
        
        footer { margin-top: 25px; font-size: 12px; color: #444; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <h1>MAHJOUB ONLINE</h1>
            <p>سوقك الذكي - إدارة سلسلة التوريد</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <label>معرف المورد</label>
                <input type="text" name="username" placeholder="اسم المستخدم" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">دخول النظام</button>
        </form>
        <footer>© 2026 Mahjoub Online. All Rights Reserved.</footer>
    </div>
</body>
</html>
