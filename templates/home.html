<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <title>Mahjoub Online | سوقك الذكي</title>
    <style>
        .hero { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 100px 0; border-radius: 0 0 50px 50px; }
        .feature-card { border: none; border-radius: 20px; transition: 0.3s; }
        .feature-card:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-light">
    <header class="hero text-center shadow-lg">
        <div class="container">
            <h1 class="display-3 fw-bold">Mahjoub Online</h1>
            <p class="lead">سوقك الذكي - أول منصة لامركزية لحوكمة سلاسل التوريد الرقمية</p>
            <div class="mt-4">
                <a href="#" class="btn btn-warning btn-lg px-5 fw-bold shadow">دخول الموردين</a>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row g-4 text-center">
            <div class="col-md-4">
                <div class="card feature-card p-4 shadow-sm">
                    <h3 class="h5">المحفظة الرقمية</h3>
                    <p class="text-muted">نظام مالي آمن وشفاف لكل مورد.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card feature-card p-4 shadow-sm">
                    <h3 class="h5">حوكمة ذكية</h3>
                    <p class="text-muted">ضمان الحقوق عبر تقنيات لامركزية.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card feature-card p-4 shadow-sm">
                    <h3 class="h5">سلاسل التوريد</h3>
                    <p class="text-muted">ربط مباشر وسريع بين المنتج والمستهلك.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
