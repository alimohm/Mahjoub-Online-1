<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين - لوحة المورد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --royal-purple: #4b0082; /* البنفسجي الملكي */
            --light-purple: #f3e5f5;
            --gold-accent: #ffd700;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 70px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f8f9fa;
            transition: all 0.3s;
        }

        /* --- الشريط الجانبي (Sidebar) --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--royal-purple);
            color: white;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-img {
            width: 80%;
            max-width: 120px;
            border-radius: 10px;
        }

        .nav-links {
            margin-top: 20px;
            list-style: none;
            padding: 0;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-item a i {
            margin-left: 15px;
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }

        .nav-item a:hover {
            background: rgba(255,255,255,0.1);
            color: var(--gold-accent);
        }

        .nav-item.active a {
            background: rgba(255,255,255,0.2);
            color: white;
            border-right: 4px solid var(--gold-accent);
        }

        /* --- المحتوى الرئيسي --- */
        .main-wrapper {
            margin-right: var(--sidebar-width);
            width: 100%;
            transition: all 0.3s;
        }

        .top-nav {
            background: white;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .content-area {
            padding: 30px;
        }

        /* --- التكيف مع الشاشات (Responsive) --- */
        @media (max-width: 768px) {
            .sidebar {
                width: var(--sidebar-collapsed-width);
            }
            .sidebar span, .sidebar-header h2 {
                display: none; /* إخفاء النصوص في الجوال */
            }
            .main-wrapper {
                margin-right: var(--sidebar-collapsed-width);
            }
            .nav-item a {
                justify-content: center;
                padding: 20px 0;
            }
            .nav-item a i {
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .content-area { padding: 15px; }
            .top-nav h3 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="Logo" class="logo-img">
            <h2 style="font-size: 1rem; margin-top: 10px;">سوقك الذكي</h2>
        </div>
        <ul class="nav-links">
            <li class="nav-item active">
                <a href="/dashboard"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fas fa-box"></i> <span>المنتجات</span></a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fas fa-chart-line"></i> <span>التقارير</span></a>
            </li>
            <li class="nav-item" style="margin-top: 50px;">
                <a href="/logout" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> <span>خروج</span></a>
            </li>
        </ul>
    </aside>

    <div class="main-wrapper">
        <header class="top-nav">
            <h3>لوحة تحكم المورد</h3>
            <div class="user-profile">
                <i class="fas fa-user-circle" style="color: var(--royal-purple); font-size: 1.5rem;"></i>
            </div>
        </header>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
