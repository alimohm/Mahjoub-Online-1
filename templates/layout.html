<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين{% endblock %} | 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f4f7f6;
            --white: #ffffff;
            --main-p-color: #4b0082; 
            --gold: #FFD700;
            --text-dark: #2c3e50;
            --border-color: #eef2f3;
            --sidebar-width: 280px;
            --sidebar-collapsed-width: 80px;
            --header-height: 80px;
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg-body); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }

        /* =========================================
           1. الشريط الجانبي (Sidebar)
           ========================================= */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--white);
            height: 100%;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .brand-container {
            padding: 30px 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center; /* لضمان توسط العناصر تحت اللوجو */
        }

        .logo-img {
            height: 50px;
            width: auto;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .brand-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--main-p-color);
            line-height: 1.2;
        }

        .brand-tagline {
            font-size: 13px;
            font-weight: 600;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        /* اسم المستخدم تحت العلامة التجارية مباشرة */
        .brand-user-id {
            font-size: 11px;
            color: #95a5a6;
            background: #f8fafc;
            padding: 2px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .menu-list { flex: 1; padding: 20px 0; overflow-y: auto; }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
            margin: 4px 15px;
            border-radius: 12px;
        }
        .menu-item i { margin-left: 15px; font-size: 18px; width: 25px; text-align: center; }
        .menu-item:hover, .menu-item.active { background-color: rgba(75,0,130,0.08); color: var(--main-p-color); }

        /* =========================================
           2. المحتوى الرئيسي (Header + Content)
           ========================================= */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }

        .top-header {
            height: var(--header-height);
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .platform-status {
            font-size: 15px;
            font-weight: 700;
            color: #2c3e50;
        }
        .platform-status span {
            color: var(--main-p-color);
            font-weight: 600;
            margin-right: 5px;
        }

        .header-profile { display: flex; align-items: center; gap: 20px; }
        
        /* أيقونة الخروج */
        .logout-link {
            color: #e74c3c;
            font-size: 18px;
            transition: 0.3s;
        }
        .logout-link:hover { transform: scale(1.1); }

        .page-content { flex: 1; padding: 30px; overflow-y: auto; }

        /* تنسيق زر السحب داخل المحفظة (يستخدم في dashboard.html) */
        .pull-btn {
            background: var(--gold);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        .pull-btn:hover { transform: scale(1.15) rotate(-10deg); background: #fff; }

        @media (max-width: 991px) {
            .sidebar { width: var(--sidebar-collapsed-width); }
            .brand-info, .menu-item span, .platform-status { display: none; }
            .menu-item { justify-content: center; margin: 5px; padding: 15px 0; }
            .menu-item i { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand-container">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="محجوب أونلاين" class="logo-img">
            <div class="brand-info">
                <span class="brand-name">محجوب أونلاين</span>
                <span class="brand-tagline">سوقك الذكي</span>
                <span class="brand-user-id">@{{ session.get('username', 'ali') }}</span>
            </div>
        </div>

        <div class="menu-list">
            <a href="/dashboard" class="menu-item {{ 'active' if request.path == '/dashboard' }}">
                <i class="fas fa-th-large"></i>
                <span>الرئيسية</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-wallet"></i>
                <span>محفظة MAH</span>
            </a>
            <a href="/add_product" class="menu-item {{ 'active' if request.path == '/add_product' }}">
                <i class="fas fa-plus-circle"></i>
                <span>رفع منتج جديد</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-chart-pie"></i>
                <span>الإحصائيات</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-cog"></i>
                <span>إعدادات المتجر</span>
            </a>
        </div>
    </nav>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="header-right">
                <div class="platform-status">
                    أهلاً بك في نظامك الإداري <span>| المنصة اللامركزية الأولى في اليمن</span>
                </div>
            </div>

            <div class="header-profile">
                <a href="/logout" class="logout-link" title="تسجيل الخروج">
                    <i class="fas fa-power-off"></i>
                </a>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
