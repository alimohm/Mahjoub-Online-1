<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين - لوحة المورد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* الألوان الملكية المعتمدة */
            --royal-purple: #4b0082; 
            --royal-black: #0d001a;
            --gold-accent: #ffd700;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 85px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f4f7f6;
            transition: all 0.3s;
        }

        /* --- الشريط الجانبي (Sidebar) بتدرج ملكي غامق --- */
        .sidebar {
            width: var(--sidebar-width);
            /* تدرج من الأسود للبنفسجي ثم الأسود في الأطراف */
            background: linear-gradient(180deg, var(--royal-black) 0%, var(--royal-purple) 50%, var(--royal-black) 100%);
            color: white;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: -5px 0 20px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        /* --- قسم اللوجو والعلامة التجارية --- */
        .sidebar-header {
            padding: 40px 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        /* جعل اللوجو أبيض ناصع */
        .logo-img {
            width: 110px;
            height: auto;
            filter: brightness(0) invert(1); /* تحويل اللوجو للأبيض بالكامل */
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .brand-info .brand-name {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .brand-info .brand-status {
            color: var(--gold-accent);
            font-size: 0.75rem;
            display: block;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* --- القائمة الملاحية --- */
        .nav-links {
            list-style: none;
            padding: 20px 0;
            margin: 0;
            flex-grow: 1;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            padding: 16px 25px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: 0.3s;
            border-right: 4px solid transparent;
        }

        .nav-item a i {
            margin-left: 15px;
            font-size: 1.2rem;
            width: 30px;
            text-align: center;
        }

        .nav-item a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-item.active a {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-right-color: var(--gold-accent);
        }

        .nav-item.active a i {
            color: var(--gold-accent);
        }

        /* --- المحتوى الرئيسي --- */
        .main-wrapper {
            margin-right: var(--sidebar-width);
            width: 100%;
            transition: all 0.4s;
        }

        .top-nav {
            background: white;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .content-area {
            padding: 40px;
            min-height: calc(100vh - 70px);
        }

        /* --- التكيف مع الشاشات (الجوال والتابلت) --- */
        @media (max-width: 992px) {
            .sidebar {
                width: var(--sidebar-collapsed-width);
            }
            .brand-info, .nav-item span {
                display: none; /* إخفاء النصوص لإظهار الأيقونات فقط */
            }
            .main-wrapper {
                margin-right: var(--sidebar-collapsed-width);
            }
            .logo-img {
                width: 50px;
            }
            .nav-item a {
                justify-content: center;
                padding: 20px 0;
            }
            .nav-item a i {
                margin-left: 0;
                font-size: 1.4rem;
            }
            .sidebar-header {
                padding: 25px 5px;
            }
        }

        @media (max-width: 576px) {
            .top-nav { padding: 0 20px; }
            .content-area { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" alt="Logo" class="logo-img">
            
            <div class="brand-info">
                <h2 class="brand-name">{{ vendor.owner_name }}</h2>
                <span class="brand-status"><i class="fas fa-crown"></i> مورد ملكي معتمد</span>
            </div>
        </div>

        <ul class="nav-links">
            <li class="nav-item active">
                <a href="/dashboard"><i class="fas fa-chart-line"></i> <span>الرئيسية</span></a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fas fa-boxes-stacked"></i> <span>إدارة المنتجات</span></a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fas fa-wallet"></i> <span>المحفظة</span></a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fas fa-gears"></i> <span>الإعدادات</span></a>
            </li>
        </ul>

        <div class="sidebar-footer" style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <a href="/logout" style="color: #ff8080; text-decoration: none; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-power-off"></i> <span style="margin-right: 12px;">تسجيل الخروج</span>
            </a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="top-nav">
            <h3 style="color: var(--royal-purple); margin: 0; font-weight: 600;">منصة محجوب أونلاين</h3>
            <div class="user-profile" style="display: flex; align-items: center; gap: 15px;">
                <span style="color: #666; font-size: 0.9rem;">أهلاً، {{ vendor.owner_name }}</span>
                <i class="fas fa-user-circle" style="font-size: 2rem; color: var(--royal-purple); cursor: pointer;"></i>
            </div>
        </header>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
