<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين | النظام الإداري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-purple: #4b0082; --deep-black: #0d001a; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; }

        /* Sidebar الذكي: يتغير شكله بناءً على حجم الشاشة */
        .sidebar {
            width: 250px; height: 100vh; position: fixed; right: 0; top: 0;
            background: var(--deep-black); color: white; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; z-index: 1000;
        }

        .logo-section { padding: 30px 10px; text-align: center; width: 100%; }
        .logo-section img { width: 60px; filter: brightness(0) invert(1); }
        .brand-name { display: block; font-size: 1.1rem; margin-top: 10px; color: #ffd700; font-weight: bold; }

        .nav-menu { list-style: none; padding: 0; width: 100%; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; transition: 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item i { font-size: 1.4rem; min-width: 40px; text-align: center; }
        .item-text { transition: 0.3s; }

        /* تعديلات الشاشات الصغيرة: تظهر الأيقونات فقط */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .brand-name, .item-text, .user-name-sidebar { display: none; }
            .main-content { margin-right: 70px !important; }
            .logo-section img { width: 40px; }
        }

        .main-content { flex: 1; margin-right: 250px; transition: 0.3s; min-height: 100vh; }
        
        /* شريط علوي لعرض اسم المستخدم */
        .top-nav {
            background: white; height: 60px; display: flex; align-items: center;
            justify-content: flex-end; padding: 0 30px; border-bottom: 1px solid #eee;
        }
        .user-profile { display: flex; align-items: center; gap: 10px; color: var(--main-purple); font-weight: 500; }
        
        .content-body { padding: 30px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-section">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp">
            <span class="brand-name">محجوب أونلاين</span>
        </div>

        <nav class="nav-menu">
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i> <span class="item-text">الرئيسية</span></a>
            <a href="#" class="nav-item"><i class="fas fa-chart-pie"></i> <span class="item-text">إحصائيات</span></a>
            <a href="#" class="nav-item"><i class="fas fa-box"></i> <span class="item-text">المنتجات</span></a>
            <a href="#" class="nav-item"><i class="fas fa-file-alt"></i> <span class="item-text">المقالات</span></a>
            <a href="/logout" class="nav-item" style="margin-top: auto; color: #ff5e5e;"><i class="fas fa-power-off"></i> <span class="item-text">خروج</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-nav">
            <div class="user-profile">
                <span>{{ vendor.owner_name }}</span> <i class="fas fa-user-circle" style="font-size: 1.8rem;"></i>
            </div>
        </header>

        <div class="content-body">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
