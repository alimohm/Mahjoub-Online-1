<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين | سحب الرصيد</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f4f7f6;
            --white: #ffffff;
            --main-p-color: #4b0082;
            --gold: #FFD700;
            --text-dark: #2c3e50;
            --border-color: #eef2f3;
            --sidebar-width: 280px;
            --header-height: 80px;
        }

        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg-body); display: flex; height: 100vh; overflow: hidden; }

        /* --- التصميم الأساسي للهيكل --- */
        .sidebar { width: var(--sidebar-width); background: var(--white); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; }
        .top-header { height: var(--header-height); background: var(--white); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .page-content { padding: 30px; flex: 1; overflow-y: auto; }

        /* --- زر الأصبع المتحرك --- */
        .withdraw-card { background: linear-gradient(135deg, var(--main-p-color), #2d004d); padding: 30px; border-radius: 20px; color: white; display: flex; justify-content: space-between; align-items: center; max-width: 500px; box-shadow: 0 10px 25px rgba(75, 0, 130, 0.2); }
        
        .finger-btn {
            position: relative; width: 60px; height: 60px; background: var(--gold); border: none; border-radius: 50%; cursor: pointer; color: var(--main-p-color); font-size: 24px;
            animation: jump 2s infinite ease-in-out; transition: 0.3s;
        }
        .finger-btn:hover { background: #fff; transform: scale(1.1); }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* =========================================
           تصميم النافذة المنبثقة (Modal CSS)
           ========================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); display: none; /* مخفية افتراضياً */
            align-items: center; justify-content: center; z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white; width: 400px; border-radius: 20px; padding: 30px;
            text-align: center; position: relative; animation: slideDown 0.4s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header h3 { margin: 0; color: var(--main-p-color); font-weight: 800; }
        .modal-body { margin-top: 20px; }
        .modal-body input {
            width: 100%; padding: 12px; border: 2px solid var(--border-color);
            border-radius: 12px; text-align: center; font-size: 18px; font-weight: 700;
            color: var(--main-p-color);
        }
        .confirm-pull-btn {
            margin-top: 20px; width: 100%; padding: 12px; background: var(--main-p-color);
            color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .confirm-pull-btn:hover { background: #6a0dad; }
        .close-modal { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #95a5a6; font-size: 20px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="padding: 20px; text-align: center;">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" style="height: 40px;">
        </div>
    </nav>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="platform-status">نظامك الإداري <span>| المنصة اللامركزية الأولى في اليمن</span></div>
            <div style="font-weight: 800; color: var(--main-p-color);">@ali <i class="fas fa-user-circle"></i></div>
        </header>

        <div class="page-content">
            <div class="withdraw-card">
                <div>
                    <p style="margin:0; opacity: 0.7;">رصيد MAH</p>
                    <h2>0.00 <span style="color: var(--gold);">MAH</span></h2>
                </div>
                <div style="text-align: center;">
                    <button class="finger-btn" onclick="openWithdrawModal()">
                        <i class="fas fa-hand-pointer"></i>
                    </button>
                    <span style="display:block; margin-top:5px; font-size:11px; color:var(--gold); font-weight:800;">سحب الرصيد</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="withdrawModal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeWithdrawModal()"></i>
            <div class="modal-header">
                <i class="fas fa-wallet" style="font-size: 40px; color: var(--gold); margin-bottom: 10px;"></i>
                <h3>طلب سحب رصيد</h3>
                <p style="font-size: 13px; color: #7f8c8d;">أدخل المبلغ الذي تود سحبه من محفظتك</p>
            </div>
            <div class="modal-body">
                <input type="number" placeholder="0.00" id="withdrawAmount">
                <button class="confirm-pull-btn">تأكيد عملية السحب</button>
            </div>
        </div>
    </div>

    <script>
        function openWithdrawModal() {
            document.getElementById('withdrawModal').style.display = 'flex';
        }

        function closeWithdrawModal() {
            document.getElementById('withdrawModal').style.display = 'none';
        }

        // إغلاق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            let modal = document.getElementById('withdrawModal');
            if (event.target == modal) {
                closeWithdrawModal();
            }
        }
    </script>

</body>
</html>
