<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محجوب أونلاين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --royal-purple: #4b0082; 
            --royal-black: #0d001a;
            --gold: #ffd700;
        }
        body { margin: 0; display: flex; font-family: sans-serif; background: #f4f7f6; }
        
        /*Sidebar Styling*/
        .sidebar {
            width: 260px; height: 100vh; position: fixed; right: 0;
            background: linear-gradient(180deg, var(--royal-black) 0%, var(--royal-purple) 50%, var(--royal-black) 100%);
            color: white; z-index: 1000; box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }
        .sidebar-header { padding: 30px 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-img { width: 100px; filter: brightness(0) invert(1); margin-bottom: 10px; }
        
        .nav-links { list-style: none; padding: 20px 0; }
        .nav-links a { display: flex; align-items: center; padding: 15px 25px; color: rgba(255,255,255,0.7); text-decoration: none; }
        .nav-links a:hover { background: rgba(255,255,255,0.1); color: white; }
        
        .main-content { margin-right: 260px; width: 100%; padding: 30px; }
        
        /* إذا كنا في صفحة الدخول، نخفي الشريط الجانبي */
        .no-sidebar .sidebar { display: none; }
        .no-sidebar .main-content { margin-right: 0; }
    </style>
</head>
<body class="{% if not session.get('vendor_id') %}no-sidebar{% endif %}">

    {% if session.get('vendor_id') %}
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img">
            {% if vendor %}
                <div style="font-weight: bold; font-size: 1.1rem;">{{ vendor.owner_name }}</div>
                <div style="color: var(--gold); font-size: 0.8rem;">مورد معتمد</div>
            {% endif %}
        </div>
        <ul class="nav-links">
            <li><a href="/dashboard"><i class="fas fa-home" style="margin-left: 10px;"></i> الرئيسية</a></li>
            <li><a href="/logout" style="color: #ff8080;"><i class="fas fa-power-off" style="margin-left: 10px;"></i> خروج</a></li>
        </ul>
    </aside>
    {% endif %}

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
