<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين | لوحة التحكم{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f8fafb;
            --white: #ffffff;
            --main-p-color: #4b0082;
            --gold: #FFD700;
            --sidebar-width: 80px; /* عرض ضيق للأيقونات فقط */
            --header-height: 80px;
        }

        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--bg-body); display: flex; height: 100vh; overflow: hidden; }

        /* السايدبار - أيقونات فقط */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            height: 100%;
            border-left: 1px solid #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 1000;
        }

        .brand-section { margin-bottom: 30px; }
        .logo-img { height: 40px; }

        .menu-list { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .menu-item {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #7f8c8d;
            border-radius: 12px; transition: 0.3s;
        }
        .menu-item i { font-size: 20px; }
        .menu-item.active { background: #f2eefa; color: var(--main-p-color); }
        .menu-item:hover { background: #f8f9fa; color: var(--main-p-color); }

        /* المحتوى الرئيسي */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .top-header {
            height: var(--header-height);
            background: var(--white);
            border-bottom: 1px solid #eef2f3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .brand-text { display: flex; align-items: center; gap: 10px; }
        .brand-name { font-weight: 800; color: var(--main-p-color); font-size: 18px; }
        .brand-tagline { font-size: 13px; color: #7f8c8d; font-weight: 600; }

        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: #f8fafc; padding: 6px 15px; border-radius: 12px;
            border: 1px solid #eef2f3;
        }

        .page-content { flex: 1; padding: 30px; overflow-y: auto; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand-section">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img">
        </div>
        <div class="menu-list">
            <a href="{{ url_for('dashboard') }}" class="menu-item {% if request.endpoint == 'dashboard' %}active{% endif %}" title="الرئيسية">
                <i class="fas fa-th-large"></i>
            </a>
            <a href="#" class="menu-item" title="المحفظة">
                <i class="fas fa-wallet"></i>
            </a>
            <a href="{{ url_for('add_product') }}" class="menu-item {% if request.endpoint == 'add_product' %}active{% endif %}" title="رفع منتج">
                <i class="fas fa-plus-circle"></i>
            </a>
            <a href="#" class="menu-item" title="الإعدادات">
                <i class="fas fa-cog"></i>
            </a>
        </div>
    </nav>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="brand-text">
                <span class="brand-name">محجوب أونلاين | سوقك الذكي</span>
                <span class="brand-tagline">لوحتك الإدارية</span>
            </div>

            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="user-badge">
                    <span style="font-size: 13px; font-weight: 800; color: var(--main-p-color);">@{{ session.get('username', 'ali') }}</span>
                    <i class="fas fa-user-circle fa-lg" style="color: var(--main-p-color);"></i>
                </div>
                <a href="{{ url_for('logout_route') }}" style="color:#e74c3c;"><i class="fas fa-power-off"></i></a>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
