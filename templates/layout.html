<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}محجوب أونلاين | لوحة التحكم{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f8fafb;
            --white: #ffffff;
            --main-p-color: #4b0082; /* الأرجواني الملكي */
            --gold: #FFD700;
            --sidebar-width: 280px;
            --header-height: 80px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-body); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- السايدبار (جهة اليمين) --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            height: 100%;
            border-left: 1px solid #eef2f3;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: var(--transition);
        }

        .brand-section { 
            padding: 25px; 
            text-align: center; 
            border-bottom: 1px solid #eef2f3; 
        }
        .logo-img { height: 45px; object-fit: contain; }

        .menu-list { flex: 1; padding: 20px 0; overflow-y: auto; }
        
        .menu-item {
            display: flex; 
            align-items: center; 
            padding: 14px 20px;
            text-decoration: none; 
            color: #7f8c8d; 
            font-weight: 600;
            margin: 4px 15px; 
            border-radius: 12px; 
            transition: var(--transition);
        }

        .menu-item i { margin-left: 15px; font-size: 18px; width: 25px; text-align: center; }

        /* حالة الزر النشط بناءً على الصفحة الحالية */
        .menu-item.active { 
            background: rgba(75, 0, 130, 0.08); 
            color: var(--main-p-color); 
        }
        
        .menu-item:hover:not(.active) {
            background: #f8f9fa;
            color: var(--main-p-color);
        }

        /* --- المحتوى الرئيسي (جهة اليسار) --- */
        .main-wrapper { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            overflow: hidden; 
        }

        /* الهيدر العلوي */
        .top-header {
            height: var(--header-height);
            background: var(--white);
            border-bottom: 1px solid #eef2f3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .header-welcome { font-size: 14px; font-weight: 700; color: #2c3e50; }
        .header-welcome span { color: var(--main-p-color); }

        .user-profile-area {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-right: auto;
        }

        .user-badge {
            display: flex; 
            align-items: center; 
            gap: 10px;
            background: #f8fafc; 
            padding: 6px 15px; 
            border-radius: 12px;
            border: 1px solid #eef2f3;
        }
        .user-name { font-size: 13px; font-weight: 800; color: var(--main-p-color); }

        /* منطقة حقن الصفحات المتغيرة */
        .page-content { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
            background: var(--bg-body);
        }

        /* التجاوب مع الجوال */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                right: -100%;
                height: 100%;
            }
            .sidebar.active { right: 0; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand-section">
            <img src="https://cdn.qumra.cloud/media/67f7f6d5f0b82f44a47bf845/1770229315912-117966978.webp" class="logo-img" alt="Logo">
        </div>
        
        <div class="menu-list">
            <a href="{{ url_for('dashboard') }}" class="menu-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <i class="fas fa-th-large"></i><span>الرئيسية</span>
            </a>
            
            <a href="#" class="menu-item">
                <i class="fas fa-wallet"></i><span>محفظة MAH</span>
            </a>
            
            <a href="{{ url_for('add_product') }}" class="menu-item {% if request.endpoint == 'add_product' %}active{% endif %}">
                <i class="fas fa-plus-circle"></i><span>رفع منتج</span>
            </a>
            
            <a href="#" class="menu-item">
                <i class="fas fa-cog"></i><span>الإعدادات</span>
            </a>
        </div>
    </nav>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="header-welcome">
                نظامك الإداري <span>| المنصة اللامركزية الأولى في اليمن</span>
            </div>

            <div class="user-profile-area">
                <div class="user-badge">
                    <span class="user-name">@{{ session.get('username', 'ali') }}</span>
                    <div style="color: var(--main-p-color);"><i class="fas fa-user-circle fa-lg"></i></div>
                </div>
                <a href="{{ url_for('logout_route') }}" style="color:#e74c3c; font-size: 18px; margin-right: 10px;">
                    <i class="fas fa-power-off"></i>
                </a>
            </div>
        </header>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        console.log("نظام محجوب أونلاين: الهيكل الموحد جاهز ✅");
    </script>
</body>
</html>
