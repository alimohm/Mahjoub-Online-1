<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --royal-purple: #6A0DAD;
            --gold: #D4AF37;
            --dark-bg: #050505;
            --card-bg: #111111;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            display: flex;
        }

        /* --- شريط الجانب الاحترافي --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #000;
            border-left: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            flex-direction: column;
            position: fixed;
            right: 0;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .logo-text {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-menu {
            flex: 1;
            padding: 20px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #aaa;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .nav-item i { margin-left: 15px; font-size: 1.2rem; width: 25px; text-align: center; }

        .nav-item:hover, .nav-item.active {
            background: var(--royal-purple);
            color: #fff;
            box-shadow: 0 4px 15px rgba(106, 13, 173, 0.3);
        }

        .nav-item.active i { color: var(--gold); }

        /* --- المحتوى الرئيسي --- */
        .main-content {
            margin-right: var(--sidebar-width);
            width: 100%;
            padding: 40px;
            min-height: 100vh;
        }

        .top-bar {
            background: linear-gradient(90deg, #111, #000);
            border: 1px solid var(--gold);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .user-info h1 { margin: 0; font-size: 1.4rem; color: var(--gold); }
        .wallet-pill {
            background: rgba(106, 13, 173, 0.2);
            border: 1px solid var(--royal-purple);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--gold);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .card h3 { margin-top: 0; color: #888; font-size: 1rem; }
        .card .value { font-size: 1.8rem; font-weight: bold; color: #fff; }

        .status-dot {
            height: 10px;
            width: 100%;
            background: var(--gold);
            position: absolute;
            bottom: 0;
            right: 0;
        }

        /* --- التوافق مع الجوال (Responsive) --- */
        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .logo-text, .nav-item span { display: none; }
            .main-content { margin-right: 80px; padding: 20px; }
        }

        @media (max-width: 576px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%; height: auto; bottom: 0; top: auto;
                flex-direction: row; border-left: none; border-top: 2px solid var(--gold);
            }
            .sidebar-header { display: none; }
            .nav-menu { display: flex; justify-content: space-around; padding: 10px; }
            .nav-item { margin-bottom: 0; flex-direction: column; font-size: 0.7rem; }
            .nav-item i { margin-left: 0; margin-bottom: 5px; }
            .main-content { margin-right: 0; margin-bottom: 80px; padding: 15px; }
            .top-bar { flex-direction: column; text-align: center; gap: 15px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo-text">سوقك الذكي</div>
        </div>
        <div class="nav-menu">
            <a href="#" class="nav-item active"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="#" class="nav-item"><i class="fas fa-box"></i> <span>منتجاتي</span></a>
            <a href="#" class="nav-item"><i class="fas fa-wallet"></i> <span>المحفظة</span></a>
            <a href="#" class="nav-item"><i class="fas fa-cog"></i> <span>الإعدادات</span></a>
            <a href="/logout" class="nav-item" style="margin-top: auto; color: #ff4444;"><i class="fas fa-sign-out-alt"></i> <span>خروج</span></a>
        </div>
    </nav>

    <main class="main-content">
        <div class="top-bar">
            <div class="user-info">
                <h1>مرحباً، {{ session['vendor_name'] }} 👋</h1>
                <div style="margin-top: 10px;">
                    <span class="wallet-pill"><i class="fas fa-id-card"></i> {{ session['wallet'] }}</span>
                </div>
            </div>
            <div class="status-badge">
                <span style="color: var(--gold); background: rgba(212, 175, 55, 0.1); padding: 8px 20px; border-radius: 10px; border: 1px solid var(--gold);">
                    <i class="fas fa-check-circle"></i> مورد معتمد
                </span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <h3>إجمالي المنتجات</h3>
                <div class="value">{{ products|length }}</div>
                <p style="color: #666; font-size: 0.8rem;">بانتظار المراجعة أو النشر</p>
                <div class="status-dot"></div>
            </div>
            
            <div class="card">
                <h3>حالة النظام</h3>
                <div class="value" style="color: #00FF00; font-size: 1.2rem;">متصل لامركزياً</div>
