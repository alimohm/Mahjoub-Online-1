{% extends "layout.html" %}
{% block content %}
<div class="dashboard-card" style="background: white; padding: 30px; border-radius: 15px; border-right: 5px solid #4b0082;">
    <h2>أهلاً بك يا {{ vendor.owner_name or vendor.username }} 👋</h2>
    <p>لقد تم التحقق من هويتك في النظام اللامركزي بنجاح.</p>
    
    <div style="background: #f4f4f9; padding: 15px; border-radius: 10px; margin-top: 20px;">
        <strong>رقم المحفظة:</strong> 
        <span style="color: #4b0082;">{{ vendor.wallet_address or 'لم يتم الربط بعد' }}</span>
    </div>
</div>
{% endblock %}
