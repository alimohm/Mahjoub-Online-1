{% extends "layout.html" %}

{% block title %}الرئيسية - محجوب أونلاين{% endblock %}

{% block content %}
<header class="top-header">
    <div class="header-welcome">
        نظامك الإداري <span>| المنصة اللامركزية الأولى في اليمن</span>
    </div>
    </header>

<div class="page-content">
    <div class="wallet-card">
        <div class="wallet-info">
            <p style="margin:0; opacity: 0.8; font-size: 13px;">رصيد محفظة MAH</p>
            <h2 style="margin:5px 0;">0.00 <span style="font-size: 18px; color: var(--gold);">MAH</span></h2>
            <small style="opacity: 0.5;">ID: {{ session.get('wallet', 'PENDING') }}</small>
        </div>
        <div class="finger-box" onclick="openWithdrawModal()">
            <button class="finger-btn"><i class="fas fa-hand-pointer"></i></button>
            <span style="display:block; margin-top:8px; font-size:10px; color:var(--gold); font-weight:800;">سحب الرصيد</span>
        </div>
    </div>
</div>

{% include 'add_product.html' %}

<script>
    // تفعيل فتح نافذة الرفع من القائمة الجانبية أو أي زر
    function openUploadModal() {
        document.getElementById('uploadProductModal').style.display = 'flex';
    }
</script>
{% endblock %}
