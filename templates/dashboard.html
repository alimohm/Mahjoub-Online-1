<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | محجوب أونلاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --purple: #6A0DAD; --gold: #D4AF37; --black: #000; }
        body { margin: 0; font-family: 'Cairo', sans-serif; background: var(--black); color: #fff; display: flex; }
        .sidebar { width: 250px; background: #0a0a0a; border-left: 1px solid var(--gold); height: 100vh; position: fixed; right: 0; }
        .content { margin-right: 250px; padding: 30px; width: 100%; }
        .card { border: 1px solid var(--gold); border-radius: 15px; padding: 20px; background: rgba(212, 175, 55, 0.05); }
        .btn-plus { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; font-size: 1.5rem; box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        
        /* Modal Style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-body { background: #111; border: 1px solid var(--gold); padding: 30px; border-radius: 20px; width: 400px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; bottom: 0; top: auto; flex-direction: row; border-top: 1px solid var(--gold); }
            .content { margin-right: 0; margin-bottom: 70px; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div style="padding: 20px; text-align: center; color: var(--gold);">سوقك الذكي</div>
        <a href="/logout" style="color: #ff4444; padding: 20px; display: block; text-decoration: none;">خروج</a>
    </nav>

    <div class="content">
        <div class="card">
            <h2>مرحباً، {{ session['vendor_name'] }} 👋</h2>
            <p>محفظتك: <span style="color: var(--gold);">{{ session['wallet'] }}</span></p>
            <p style="font-size: 0.8rem; color: #2ecc71;">الحالة: متصل بنظام قمرة ✅</p>
        </div>

        <h3 style="margin-top: 30px;">📦 منتجاتك</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">
            {% for p in products %}
            <div style="background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 10px;">
                <h4 style="margin: 0;">{{ p.name }}</h4>
                <p style="color: var(--gold);">{{ p.price }} $</p>
            </div>
            {% else %}
            <p style="color: #555;">لا توجد منتجات حالياً.</p>
            {% endfor %}
        </div>
    </div>

    <button class="btn-plus" onclick="document.getElementById('m').style.display='flex'"><i class="fas fa-plus"></i></button>

    <div id="m" class="modal">
        <div class="modal-body">
            <h3 style="color: var(--gold); margin-top: 0;">رفع منتج جديد</h3>
            <form action="/upload_product" method="POST">
                <input type="text" name="name" placeholder="اسم المنتج" required>
                <input type="number" step="0.01" name="price" placeholder="السعر" required>
                <textarea name="description" placeholder="الوصف"></textarea>
                <button type="submit" style="width: 100%; padding: 12px; background: var(--purple); color: #fff; border: none; border-radius: 8px; cursor: pointer;">تأكيد الرفع</button>
            </form>
            <button onclick="document.getElementById('m').style.display='none'" style="background: none; border: none; color: #666; margin-top: 10px; cursor: pointer;">إلغاء</button>
        </div>
    </div>
</body>
</html>
