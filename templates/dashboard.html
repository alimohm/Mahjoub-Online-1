{% extends "layout.html" %}

{% block content %}
<style>
    /* تصميم المحفظة البنفسجية المنسق - لم يتم تغيير أي شيء في التصميم */
    .wallet-container {
        background: linear-gradient(135deg, #30005a 0%, #4b0082 100%);
        padding: 40px;
        border-radius: 30px;
        color: white;
        max-width: 550px;
        margin: 20px auto;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(75, 0, 130, 0.25);
        text-align: center;
        border: 1px solid rgba(255,255,255,0.1);
    }

    /* تأثير زخرفي خلف المحفظة */
    .wallet-container::after {
        content: ''; position: absolute; top: -50%; left: -50%;
        width: 100%; height: 100%; background: rgba(255,255,255,0.03);
        transform: rotate(45deg); pointer-events: none;
    }

    .balance-label { font-size: 14px; opacity: 0.7; font-weight: 600; margin-bottom: 10px; }
    .balance-value { font-size: 38px; font-weight: 800; margin-bottom: 5px; color: var(--white); }
    .balance-value span { color: var(--gold); font-size: 20px; margin-right: 8px; }
    
    .wallet-id-code { 
        font-family: monospace; font-size: 13px; background: rgba(0,0,0,0.2); 
        padding: 5px 15px; border-radius: 50px; display: inline-block; margin-bottom: 30px;
        color: #ddd; border: 1px solid rgba(255,255,255,0.05);
    }

    .action-box { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    
    .finger-trigger {
        width: 70px; height: 70px;
        background: var(--gold);
        border: none; border-radius: 50%;
        color: #30005a; font-size: 28px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: 0.3s;
        box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        animation: pulse-gold 2s infinite;
    }
    
    @keyframes pulse-gold {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
        70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
        100% { transform: scale(1); }
    }

    .withdraw-btn-label { color: var(--gold); font-weight: 800; font-size: 13px; text-transform: uppercase; }
</style>

<div class="wallet-container">
    <div class="balance-label">رصيد محفظة MAH الحالي</div>
    <div class="balance-value">
        <span>MAH</span>{{ "%.2f"|format(vendor.balance if vendor.balance else 0.00) }}
    </div>

    <div class="wallet-id-code">ID: {{ vendor.wallet_address }}</div>

    <div class="action-box">
        <button class="finger-trigger" onclick="alert('عزيزي {{ vendor.username }}، طلب السحب قيد المعالجة...')">
            <i class="fas fa-hand-pointer"></i>
        </button>
        <span class="withdraw-btn-label">سحب الرصيد الآن</span>
    </div>
</div>
{% endblock %}
