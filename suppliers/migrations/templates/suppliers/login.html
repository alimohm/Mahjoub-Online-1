
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الموردين - محجوب أونلاين</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-900 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center border-t-8 border-purple-600">
        <h2 class="text-3xl font-extrabold text-purple-800 mb-2">[ Mahjoub Online ]</h2>
        <p class="text-purple-600 mb-8 font-semibold">سوقك الذكي - دخول الموردين</p>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-sm font-bold">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4 text-right">
                <label class="block text-purple-800 text-sm font-bold mb-2 pr-2">اسم المستخدم</label>
                <input type="text" name="username" required class="w-full p-3 border-2 border-purple-100 rounded-xl focus:outline-none focus:border-purple-600 transition">
            </div>
            <div class="mb-6 text-right">
                <label class="block text-purple-800 text-sm font-bold mb-2 pr-2">كلمة المرور</label>
                <input type="password" name="password" required class="w-full p-3 border-2 border-purple-100 rounded-xl focus:outline-none focus:border-purple-600 transition">
            </div>
            <button type="submit" class="w-full bg-purple-700 text-white p-4 rounded-xl font-bold text-lg hover:bg-purple-800 shadow-lg transition-all active:scale-95">
                دخول آمن للمنصة
            </button>
        </form>
        <p class="mt-6 text-gray-400 text-xs">أول منصة لا مركزية لحوكمة سلاسل الإمداد الرقمية</p>
    </div>
</body>
</html>
